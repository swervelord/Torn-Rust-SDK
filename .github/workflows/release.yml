name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo publish dry run
        run: cargo publish --dry-run
